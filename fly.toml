# fly.toml moved to repository root. Build uses the Dockerfile in the WebApi project folder.
app = "railway-platform-webapi"
primary_region = 'cdg'

[build]
  dockerfile = "Railway.Platform.WebApi/Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
